services:
  mariadb:
    image: mariadb:10.6
    ports:
      - "127.0.0.1:3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-innodb-read-only-compressed
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    networks: [oakdepo-net]
    restart: unless-stopped
  redis-cache:
    image: redis:7-alpine
    networks: [oakdepo-net]
    restart: unless-stopped
  redis-queue:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-queue-data:/data
    networks: [oakdepo-net]
    restart: unless-stopped
  backend:
    image: erpnext-custom:cakra-frappe-docker-YYYYMMDD
    volumes: ["sites:/home/frappe/frappe-bench/sites"]
    networks: [oakdepo-net]
    restart: unless-stopped
    depends_on: [mariadb, redis-cache, redis-queue]
  frontend:
    image: erpnext-custom:cakra-frappe-docker-YYYYMMDD
    entrypoint: ["bash", "-lc", "export PATH=$PATH:/usr/sbin; /usr/local/bin/entrypoint.sh true; exec /usr/local/bin/nginx-entrypoint.sh;"]
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: app.oakdepo.com
      CLIENT_MAX_BODY_SIZE: 50m
      PROXY_READ_TIMEOUT: 300
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
    ports: ["127.0.0.1:8088:8080"]
    volumes: ["sites:/home/frappe/frappe-bench/sites"]
    depends_on: [backend, websocket]
    networks: [oakdepo-net]
    restart: unless-stopped
  websocket:
    image: erpnext-custom:cakra-frappe-docker-YYYYMMDD
    command: ["node","/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    volumes: ["sites:/home/frappe/frappe-bench/sites"]
    networks: [oakdepo-net]
    restart: unless-stopped
    depends_on: [redis-queue]
  scheduler:
    image: erpnext-custom:cakra-frappe-docker-YYYYMMDD
    command: ["bench","schedule"]
    volumes: ["sites:/home/frappe/frappe-bench/sites"]
    networks: [oakdepo-net]
    restart: unless-stopped
  queue-short:
    image: erpnext-custom:cakra-frappe-docker-YYYYMMDD
    command: ["bench","worker","--queue","short,default"]
    volumes: ["sites:/home/frappe/frappe-bench/sites"]
    networks: [oakdepo-net]
    restart: unless-stopped
  queue-long:
    image: erpnext-custom:cakra-frappe-docker-YYYYMMDD
    command: ["bench","worker","--queue","long,default,short"]
    volumes: ["sites:/home/frappe/frappe-bench/sites"]
    networks: [oakdepo-net]
    restart: unless-stopped
volumes:
  sites: {name: oakdepo-prod_sites}
  mariadb-data: {name: oakdepo-prod_mariadb-data}
  redis-queue-data: {name: oakdepo-prod_redis-queue-data}
networks:
  oakdepo-net: {name: oakdepo-prod}
