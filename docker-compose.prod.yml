x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-bench-env: &bench-env
  SITE_NAME: ${SITE_NAME:?SITE_NAME is required}
  # Branding logo (env-driven; kosong = pakai asset bawaan container_depot)
  BRAND_LOGO_MAIN: ${BRAND_LOGO_MAIN:-}
  BRAND_LOGO_PDF: ${BRAND_LOGO_PDF:-}
  # 0 = jangan paksa Letter Head 'OAK Brand' jadi default (kelola manual)
  BRAND_LETTERHEAD_DEFAULT: ${BRAND_LETTERHEAD_DEFAULT:-1}

services:
  mariadb:
    image: mariadb:10.8
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging: *default-logging

  redis-cache:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

  redis-queue:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

  redis-socketio:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

  configurator:
    image: cakra-erpnext:prod
    build:
      context: .
      args:
        FRAPPE_REPO: ${FRAPPE_REPO:-https://github.com/cakra-erpnext-apps/frappe}
        FRAPPE_BRANCH: ${FRAPPE_BRANCH:-version-16}
    command: >
      bash -c "init-site.sh build-assets.sh && echo configured"
    environment:
      SITE_NAME: ${SITE_NAME:?SITE_NAME is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      DB_HOST: mariadb
      DB_PORT: 3306
      REDIS_CACHE: redis://redis-cache:6379
      REDIS_QUEUE: redis://redis-queue:6379
      REDIS_SOCKETIO: redis://redis-socketio:6379
      SOCKETIO_PORT: 9000
      INSTALL_APPS: ${INSTALL_APPS:-erpnext,hrms,erpnext_custom,container_depot,crm,helpdesk,raven,gameplan,telephony}
      BUILD_APPS: ${BUILD_APPS:-frappe,erpnext,hrms,crm,helpdesk,raven,gameplan,telephony}
      SKIP_BUILD_APPS: ${SKIP_BUILD_APPS:-erpnext_custom,container_depot}
      ASSET_STRICT: ${ASSET_STRICT:-1}
      MATERIALIZE_ASSETS: "1"
    volumes:
      - bench-sites:/home/frappe/frappe-bench/sites
      - bench-logs:/home/frappe/frappe-bench/logs
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      redis-socketio:
        condition: service_healthy
    restart: "no"
    logging: *default-logging

  backend:
    image: cakra-erpnext:prod
    command: >
      bash -c "cd /home/frappe/frappe-bench &&
      ./env/bin/gunicorn
      --chdir=/home/frappe/frappe-bench/sites
      --bind=0.0.0.0:8000
      --threads=4
      --workers=2
      --worker-class=gthread
      --worker-tmp-dir=/dev/shm
      --timeout=120
      frappe.app:application"
    environment: *bench-env
    volumes:
      - bench-sites:/home/frappe/frappe-bench/sites
      - bench-logs:/home/frappe/frappe-bench/logs
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - --header="Host: app.oakdepo.com" http://127.0.0.1:8000/api/method/ping >/dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      configurator:
        condition: service_completed_successfully
    restart: unless-stopped
    logging: *default-logging
    # Uncomment and tune for your server:
    # deploy:
    #   resources:
    #     limits:
    #       memory: 2G
    #       cpus: "2.0"

  websocket:
    image: cakra-erpnext:prod
    command: >
      bash -c "cd /home/frappe/frappe-bench && node apps/frappe/socketio.js"
    environment: *bench-env
    volumes:
      - bench-sites:/home/frappe/frappe-bench/sites
      - bench-logs:/home/frappe/frappe-bench/logs
    depends_on:
      configurator:
        condition: service_completed_successfully
      redis-socketio:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  queue-short:
    image: cakra-erpnext:prod
    command: >
      bash -c "cd /home/frappe/frappe-bench && bench worker --queue short"
    environment: *bench-env
    volumes:
      - bench-sites:/home/frappe/frappe-bench/sites
      - bench-logs:/home/frappe/frappe-bench/logs
    depends_on:
      configurator:
        condition: service_completed_successfully
      redis-queue:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  queue-default:
    image: cakra-erpnext:prod
    command: >
      bash -c "cd /home/frappe/frappe-bench && bench worker --queue default"
    environment: *bench-env
    volumes:
      - bench-sites:/home/frappe/frappe-bench/sites
      - bench-logs:/home/frappe/frappe-bench/logs
    depends_on:
      configurator:
        condition: service_completed_successfully
      redis-queue:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  queue-long:
    image: cakra-erpnext:prod
    command: >
      bash -c "cd /home/frappe/frappe-bench && bench worker --queue long"
    environment: *bench-env
    volumes:
      - bench-sites:/home/frappe/frappe-bench/sites
      - bench-logs:/home/frappe/frappe-bench/logs
    depends_on:
      configurator:
        condition: service_completed_successfully
      redis-queue:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  scheduler:
    image: cakra-erpnext:prod
    command: >
      bash -c "cd /home/frappe/frappe-bench && bench schedule"
    environment: *bench-env
    volumes:
      - bench-sites:/home/frappe/frappe-bench/sites
      - bench-logs:/home/frappe/frappe-bench/logs
    depends_on:
      configurator:
        condition: service_completed_successfully
      redis-queue:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - bench-sites:/home/frappe/frappe-bench/sites:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - --header="Host: app.oakdepo.com" http://127.0.0.1/api/method/ping >/dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

volumes:
  mariadb-data:
  bench-sites:
  bench-logs:
