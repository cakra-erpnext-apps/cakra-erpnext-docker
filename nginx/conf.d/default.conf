upstream frappe_backend {
    server backend:8000 fail_timeout=0;
}

upstream frappe_socketio {
    server websocket:9000 fail_timeout=0;
}

# HTTP (port 80)
# Serves traffic + Let's Encrypt HTTP-01 challenge.
# After you have TLS certs in /etc/nginx/certs/, uncomment the redirect
# below and enable the HTTPS server block at the bottom of this file.
server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Uncomment after HTTPS server block is active:
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    location /socket.io/ {
        proxy_pass http://frappe_socketio;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Frappe-Site-Name $host;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://frappe_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Frappe-Site-Name $host;
        proxy_read_timeout 120s;
        proxy_redirect off;
    }
}

