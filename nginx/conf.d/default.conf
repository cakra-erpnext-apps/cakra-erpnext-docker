# Letakkan di level http{} — menyesuaikan header Connection untuk WS vs polling
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream frappe_backend {
    server backend:8000 fail_timeout=0;
}
upstream frappe_socketio {
    server websocket:9000 fail_timeout=0;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 50m;

    root /home/frappe/frappe-bench/sites;

    # --- Static assets (ini SAJA yang boleh di-serve langsung dari disk) ---
    location /assets/ {
        try_files /assets/$uri =404;   # note: alias di-handle via root di atas
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- WebSocket / socket.io ---
    location /socket.io/ {
        proxy_pass http://frappe_socketio;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;   # <-- map, bukan hardcode
        proxy_set_header Host $host;
        proxy_set_header Origin $http_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Frappe-Site-Name $host;
        proxy_read_timeout 120s;
    }

    # --- SEMUA halaman (termasuk /helpdesk, /crm, /raven, /gameplan) ke backend ---
    # Frappe yang routing SPA + render index.html dengan csrf_token.
    # JANGAN intercept path SPA di nginx.
    location / {
        proxy_pass http://frappe_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Frappe-Site-Name $host;
        proxy_read_timeout 120s;
        proxy_redirect off;
    }
}