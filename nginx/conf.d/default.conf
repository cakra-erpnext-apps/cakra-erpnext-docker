upstream frappe_backend {
    server backend:8000 fail_timeout=0;
}

upstream frappe_socketio {
    server websocket:9000 fail_timeout=0;
}

# HTTP (port 80 inside the container, mapped to 127.0.0.1:8088 on host).
# All TLS termination, HTTP→HTTPS redirect, and ACME challenges happen at
# the host-level reverse proxy (host nginx / Caddy / Traefik) sitting in
# front of this container — see README "Production Deployment".
server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    location /assets/ {
        alias /home/frappe/frappe-bench/sites/assets/;
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /socket.io/ {
        proxy_pass http://frappe_socketio;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Origin $http_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Frappe-Site-Name $host;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://frappe_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Frappe-Site-Name $host;
        proxy_read_timeout 120s;
        proxy_redirect off;
    }
}

# TLS is terminated by the host-level reverse proxy (host nginx / Caddy /
# Traefik), not by this container. This container only listens on
# 127.0.0.1:8088 (HTTP) — see docker-compose.prod.yml. The outer proxy must
# forward `X-Forwarded-Proto: https` so Frappe generates correct URLs.
